<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC QuickPay ⚡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #1e293b; padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        h1 { font-size: 22px; color: #38bdf8; }
        .btn { background: #0284c7; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #0369a1; }
        .main-box { background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #94a3b8; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; background: #0f172a; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; font-size: 16px; outline: none; }
        .presets { display: flex; gap: 10px; margin-top: 10px; }
        .preset-btn { flex: 1; background: #334155; border: 1px solid #475569; color: #cbd5e1; padding: 8px; border-radius: 8px; cursor: pointer; }
        .pay-btn { width: 100%; background: #10b981; padding: 14px; font-size: 16px; margin-top: 10px; }
        .history-box { background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        .badge { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 8px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARC QuickPay ⚡</h1>
            <button class="btn" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
        </header>

        <div class="main-box">
            <div class="form-group">
                <label>Receiver Wallet Address</label>
                <input type="text" id="recipientAddress" placeholder="0x..." value="0xad123... (Apnar Address Din)">
            </div>

            <div class="form-group">
                <label>Amount (ARC)</label>
                <input type="number" id="amountInput" placeholder="0.0">
                <div class="presets">
                    <button class="preset-btn" onclick="setAmount(1)">1 ARC</button>
                    <button class="preset-btn" onclick="setAmount(5)">5 ARC</button>
                    <button class="preset-btn" onclick="setAmount(10)">10 ARC</button>
                </div>
            </div>

            <button class="btn pay-btn" id="payBtn" onclick="sendPayment()">Send Direct Payment</button>
        </div>

        <div class="history-box">
            <h3>Recent Payments (This Session)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Receiver</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr><td colspan="3" style="text-align: center; color: #64748b;">No transactions yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let provider, signer, userAddress;

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    provider = new ethers.BrowserProvider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = await provider.getSigner();
                    userAddress = await signer.getAddress();
                    document.getElementById("connectBtn").innerText = `${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
                    document.getElementById("connectBtn").style.background = "#10b981";
                } catch (err) { alert("Rejected!"); }
            } else { alert("Install MetaMask!"); }
        }

        function setAmount(val) { document.getElementById("amountInput").value = val; }

        async function sendPayment() {
            if (!signer) { alert("Connect wallet first!"); return; }
            const amount = document.getElementById("amountInput").value;
            const toAddress = document.getElementById("recipientAddress").value;
            
            if (!amount || amount <= 0) { alert("Enter valid amount!"); return; }

            try {
                document.getElementById("payBtn").innerText = "Processing...";
                const tx = await signer.sendTransaction({
                    to: toAddress,
                    value: ethers.parseEther(amount.toString())
                });
                await tx.wait();
                alert("Payment Successful! 🎉");
                
                const body = document.getElementById("historyBody");
                if(body.innerHTML.includes("No transactions yet")) body.innerHTML = "";
                body.innerHTML = `<tr><td>${toAddress.substring(0,6)}...</td><td>${amount} ARC</td><td><span class="badge">Success</span></td></tr>` + body.innerHTML;
            } catch (err) { alert("Transaction Failed"); }
            finally { document.getElementById("payBtn").innerText = "Send Direct Payment"; }
        }
    </script>
</body>
</html>
